<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<vbox
  id="zotero-prefpane-__addonRef__"
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window: window })"
>
<groupbox>
  <label><html:h2 data-l10n-id="ainote-prefs-heading"></html:h2></label>

  <separator class="thin" />
  <html:h3>大模型配置</html:h3>

  <hbox align="center">
    <label value="当前配置：" />
    <html:select id="ainote-active-profile" style="flex: 1; width: 420px;"></html:select>
    <html:button id="ainote-add-profile" type="button" style="margin-left: 8px;">新增配置</html:button>
  </hbox>

  <vbox id="ainote-profiles-list" style="width: 100%; margin-top: 8px;"></vbox>

  <separator class="thin" />

  <hbox align="center">
    <label data-l10n-id="ainote-prefs-truncateLength" />
    <html:input
      type="number"
      id="zotero-prefpane-__addonRef__-truncateLength"
      preference="__prefsPrefix__.truncateLength"
      min="1"
      max="100"
      step="1"
      style="width: 150px;"
    />
    <label data-l10n-id="ainote-prefs-truncateLength-hint" />
  </hbox>

  <vbox>
    <label data-l10n-id="ainote-prefs-summaryPrompt" />
    <html:textarea
      id="zotero-prefpane-__addonRef__-summaryPrompt"
      preference="__prefsPrefix__.summaryPrompt"
      rows="8"
      style="width: 100%; font-family: monospace;"
    />
  </vbox>
</groupbox>
</vbox>
