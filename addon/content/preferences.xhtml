<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<vbox
  id="zotero-prefpane-__addonRef__"
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window: window })"
>
<groupbox>
  <label><html:h2 data-l10n-id="ainote-prefs-heading"></html:h2></label>

  <separator class="thin" />
  <vbox>
    <html:button id="ainote-toggle-profiles-section" type="button" data-l10n-id="ainote-prefs-modelSection" style="width: 100%; text-align: left;"></html:button>
    <vbox id="ainote-profiles-section" style="width: 100%; margin-top: 8px;">
      <hbox align="center">
        <label data-l10n-id="prefs-active-profile" />
        <html:select id="ainote-active-profile" style="flex: 1; width: 420px;"></html:select>
        <html:button id="ainote-add-profile" type="button" data-l10n-id="prefs-add-profile" style="margin-left: 8px;"></html:button>
      </hbox>

      <vbox id="ainote-profiles-list" style="width: 100%; margin-top: 8px;"></vbox>
    </vbox>
  </vbox>

  <separator class="thin" />

  <vbox>
    <html:button id="ainote-toggle-prompt-templates-section" type="button" style="width: 100%; text-align: left;" data-l10n-id="ainote-prefs-summaryPrompt"></html:button>
    <vbox id="ainote-prompt-templates-section" style="width: 100%; margin-top: 8px;">
      <hbox align="center">
        <label data-l10n-id="ainote-prefs-currentPromptTemplate" />
        <html:select id="ainote-active-prompt-template" style="flex: 1; width: 420px;"></html:select>
        <html:button id="ainote-add-prompt-template" type="button" data-l10n-id="ainote-prefs-addPromptTemplate" style="margin-left: 8px;"></html:button>
      </hbox>
      <hbox align="center" style="margin-top: 8px;">
        <html:label style="display: inline-flex; align-items: center; gap: 6px; color: inherit;">
          <html:input id="ainote-pin-current-prompt-template" type="checkbox" />
          <html:span data-l10n-id="prefs-pin-current-template"></html:span>
        </html:label>
      </hbox>
      <html:div data-l10n-id="prefs-pin-current-template-hint" style="margin-top: 4px; color: var(--ainote-text-muted); font-size: 12px; line-height: 1.5;"></html:div>
      <vbox id="ainote-prompt-templates-list" style="width: 100%; margin-top: 8px;"></vbox>
    </vbox>
  </vbox>

  <separator class="thin" />

  <vbox>
    <html:button id="ainote-toggle-web-summary-section" type="button" style="width: 100%; text-align: left;" data-l10n-id="ainote-prefs-webSummarySection"></html:button>
    <vbox id="ainote-web-summary-section" style="width: 100%; margin-top: 8px;">
      <vbox id="ainote-web-summary-settings" style="width: 100%; margin-top: 8px;"></vbox>
    </vbox>
  </vbox>
</groupbox>
</vbox>
