<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title data-i18n="optionsTitle">AiNote Web Summary Settings</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 760px;
        margin: 32px auto;
        padding: 0 16px;
        color: #1f2328;
      }
      h1 {
        font-size: 24px;
      }
      .row {
        margin: 16px 0;
      }
      label {
        display: block;
        font-weight: 700;
        margin-bottom: 6px;
      }
      input[type="text"],
      input[type="number"],
      select {
        width: 100%;
        padding: 8px 10px;
        box-sizing: border-box;
      }
      .hint {
        color: #57606a;
        font-size: 12px;
        margin-top: 4px;
      }
      button {
        padding: 8px 12px;
        cursor: pointer;
      }
      #status {
        margin-top: 20px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1 data-i18n="optionsHeading">AiNote Web Summary Settings</h1>

    <div class="row">
      <label for="bridgeUrl" data-i18n="bridgeUrlLabel">Bridge URL</label>
      <input id="bridgeUrl" type="text" />
    </div>

    <div class="row">
      <button id="save" data-i18n="saveButton">Save</button>
      <button id="test" data-i18n="testButton">Test Connection</button>
    </div>

    <div id="status"></div>

    <script type="module" src="options.js"></script>
  </body>
</html>
